<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meaningless</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<script>
    // すべての作品バー（リンク）を取得
    const galleryItems = document.querySelectorAll('.gallery-item');

    galleryItems.forEach(item => {
      item.addEventListener('click', function(e) {
        // スマホなどのタッチ環境（ホバーが有効でない画面幅）を対象にする場合
        if (window.innerWidth <= 768) {
          // もし、まだこのバーが「アクティブ（開いた状態）」でなければ
          if (!this.classList.contains('active')) {
            e.preventDefault(); // 1回目はページ移動をキャンセル！
            
            // 他に開いているバーがあれば一度全部閉じる
            galleryItems.forEach(i => i.classList.remove('active'));
            
            // このバーを開く
            this.classList.add('active');
          }
          // すでに 'active' がついている状態（2回目タップ）なら、通常通りリンク先に飛びます
        }
      });
    });

    // バー以外の場所をタップしたら説明を閉じる親切設計
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.gallery-item')) {
        galleryItems.forEach(item => item.classList.remove('active'));
      }
    });
  </script>

</body>
</html>
<body>

  <header class="site-header">
    <h1>Meaningless</h1>
  </header>

  <main class="gallery-container">
    
        <a href="Circles.html" class="gallery-item item-color4">
      <div class="item-content">
        <h2>Circles</h2>
        <p class="description">色の波紋。リロードすると色のパターンが変わる。</p>
      </div>
    </a>

    <a href="Flow.html" class="gallery-item item-color3">
      <div class="item-content">
        <h2>Flow</h2>
        <p class="description">色の流れ。</p>
      </div>
    </a>

    <a href="Ruins.html" class="gallery-item item-color2">
      <div class="item-content">
        <h2>Ruins</h2>
        <p class="description">崩れ去る言葉。</p>
      </div>
    </a>

    <a href="Life.html" class="gallery-item item-color1">
      <div class="item-content">
        <h2>Life</h2>
        <p class="description">生まれて死ぬ。クリック（タップ）するといっぱい生まれる。</p>
      </div>
    </a>

  </main>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="https://x.com/あなたのユーザー名" target="_blank" rel="noopener noreferrer">X (TWITTER)</a>

    </div>
  </footer>

</body>
</html>
