<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #030305;
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: fixed;
            touch-action: none;
        }
    </style>
</head>
<body>

<script>
let particles = [];
let maxTargetParticles = 1700;
let minTargetParticles = 300;
const noiseScale = 0.0035; 
const timeScale = 0.001;
let baseHue; 

setup = () => {
    createCanvas(document.body.clientWidth, document.body.clientHeight);
    colorMode(HSB, 360, 100, 100, 1);
    background('#030305'); 
    
    baseHue = random(360); 
    
    for (let i = 0; i < 1000; i++) {
        particles.push(new Particle());
    }
};

draw = () => {
    let bgAlpha = width < 768 ? 0.035 : 0.015; 
    background(3, 3, 5, bgAlpha); 
    
    baseHue = (baseHue + 0.03) % 360;

    let wave = (sin(frameCount * 0.003) + 1) / 2; 
    let targetCount = int(map(wave, 0, 1, minTargetParticles, maxTargetParticles));

    while (particles.length < targetCount) {
        particles.push(new Particle());
    }
    while (particles.length > targetCount) {
        particles.shift();
    }

    for (let p of particles) {
        p.update();
        p.follow();
        p.display();
        p.checkEdges();
    }
};

windowResized = () => {
    resizeCanvas(document.body.clientWidth, document.body.clientHeight);
    background('#030305');
};

touchMoved = () => {
    return false; 
};

class Particle {
    constructor() {
        this.init();
    }

    init() {
        this.pos = createVector(random(-50, width + 50), random(-50, height + 50));
        this.prevPos = this.pos.copy();
        this.acc = createVector(0, 0);
        this.vel = createVector(0, 0);
        
        let sizeFactor = width < 768 ? 0.6 : 1.0; 
        
        // 【配色バランス変更：類似色 98% : 補色 2%】
        let r = random(100);
        if (r < 32.66) {
            this.colorType = 0; // 類似色 A
            this.maxSpeed = random(1.2, 2.8);
            this.strokeWidth = random(0.5, random(2.0, 8.0)) * sizeFactor;
        } else if (r < 65.33) {
            this.colorType = 1; // 類似色 B
            this.maxSpeed = random(1.2, 2.8);
            this.strokeWidth = random(0.5, random(2.0, 8.0)) * sizeFactor;
        } else if (r < 98.0) {
            this.colorType = 2; // 類似色 C
            this.maxSpeed = random(1.2, 2.8);
            this.strokeWidth = random(0.5, random(2.0, 8.0)) * sizeFactor;
        } else {
            this.colorType = 3; // 補色 (わずか2%のレア粒子)
            
            // 【2%の補色を引き立てる物理チューニング】
            // 速度を通常より少し速くし（最大3.5）、極細になりすぎないようにして
            // 流体の中に一本のシャープな「閃光」を刻むようにします
            this.maxSpeed = random(2.2, 3.5);
            this.strokeWidth = random(1.2, random(3.0, 8.0)) * sizeFactor;
        }
    }

    update() {
        this.vel.add(this.acc);
        this.vel.limit(this.maxSpeed);
        this.prevPos = this.pos.copy();
        this.pos.add(this.vel);
        this.acc.mult(0);
    }

    follow() {
        let n = noise(this.pos.x * noiseScale, this.pos.y * noiseScale, frameCount * timeScale);
        let angle = n * TWO_PI * 4;
        let force = p5.Vector.fromAngle(angle);
        force.mult(0.07); 
        this.acc.add(force);
    }

    display() {
        let finalHue;
        let saturationValue = 85;
        let brightnessValue = 90;

        let hueA = baseHue;                   
        let hueB = (baseHue - 20 + 360) % 360; 
        let hueC = (baseHue + 20) % 360;       
        let accentHue = (baseHue + 180) % 360; 

        if (this.colorType === 0) {
            finalHue = hueA;
        } else if (this.colorType === 1) {
            finalHue = hueB;
        } else if (this.colorType === 2) {
            finalHue = hueC;
        } else if (this.colorType === 3) {
            finalHue = accentHue;
            saturationValue = 100; // 発色を最上位に
            brightnessValue = 100;
        }

        // 2%の補色が埋もれないよう、さらにベース透明度を微増（0.30）
        let baseAlpha = this.colorType === 3 ? 0.30 : 0.09;
        if (this.strokeWidth > 3) {
            baseAlpha *= map(this.strokeWidth, 3, 8, 0.6, 0.3);
        }
        
        if (width < 768) {
            baseAlpha *= 1.4;
        }

        stroke(finalHue, saturationValue, brightnessValue, baseAlpha);
        strokeWeight(this.strokeWidth);
        line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
    }

    checkEdges() {
        const margin = 50; 
        if (this.pos.x < -margin || this.pos.x > width + margin || this.pos.y < -margin || this.pos.y > height + margin) {
            this.init();
            this.prevPos = this.pos.copy();
        }
    }
}
</script>

</body>
</html>
