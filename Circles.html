<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: pointer;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #tone-display {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: sans-serif;
            font-size: 12px;
            color: rgba(128, 128, 128, 0.4);
            pointer-events: none;
            user-select: none;
            opacity: 1;
            transition: opacity 2s ease;
        }
    </style>
</head>
<body>

<div id="tone-display"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// --- カラーパレット生成ロジック ---
class Palette {
    constructor() {
        const tones = ['vitamin', 'pastel', 'classic', 'neon', 'vivid'];
        this.tone = tones[Math.floor(Math.random() * tones.length)];
        
        this.baseHue = Math.floor(Math.random() * 360);

        switch (this.tone) {
            case 'vitamin':
                this.isDark = Math.random() > 0.6;
                this.bgColor = this.isDark ? `hsl(${this.baseHue}, 30%, 8%)` : `hsl(${this.baseHue}, 15%, 96%)`;
                this.accentHue = (this.baseHue + 120 + Math.floor(Math.random() * 120)) % 360;
                break;

            case 'vivid': 
                this.bgSat = 70 + Math.floor(Math.random() * 6); 
                this.bgLight = 40 + Math.floor(Math.random() * 5); 
                this.bgColor = `hsl(${this.baseHue}, ${this.bgSat}%, ${this.bgLight}%)`;
                this.complementaryHue = (this.baseHue + 180) % 360;
                break;

            case 'pastel':
                this.bgColor = `hsl(${this.baseHue}, 15%, 93%)`;
                this.accentHue = (this.baseHue + 140 + Math.floor(Math.random() * 80)) % 360;
                break;

            case 'neon':
                this.bgColor = `hsl(${this.baseHue}, 25%, 4%)`;
                this.accentHue = (this.baseHue + 120 + Math.floor(Math.random() * 120)) % 360;
                break;

            case 'classic':
                this.bgSat = 8 + Math.floor(Math.random() * 8); 
                this.bgLight = 25 + Math.floor(Math.random() * 50); 
                this.bgColor = `hsl(${this.baseHue}, ${this.bgSat}%, ${this.bgLight}%)`;
                this.accentHue = (this.baseHue + 150 + Math.floor(Math.random() * 60)) % 360;
                break;
        }

        const displayEl = document.getElementById('tone-display');
        displayEl.textContent = `mode: ${this.tone}`;
        
        setTimeout(() => {
            displayEl.style.opacity = '0';
        }, 10000);
    }

    getRippleColor() {
        const isAccent = Math.random() < 0.05;

        switch (this.tone) {
            case 'vitamin':
                if (isAccent) {
                    return { h: this.accentHue, s: 90 + Math.random() * 10, l: 50 + Math.random() * 10 };
                } else {
                    const h = (this.baseHue + Math.floor(Math.random() * 40) - 20 + 360) % 360;
                    return { h, s: 80 + Math.random() * 15, l: 55 + Math.random() * 10 };
                }

            case 'vivid':
                if (isAccent) {
                    const h = (this.complementaryHue + Math.floor(Math.random() * 20) - 10 + 360) % 360;
                    return { h: h, s: 85, l: 70 };
                } else {
                    const direction = Math.random() > 0.5 ? 1 : -1;
                    const hOffset = 60 + Math.floor(Math.random() * 60); 
                    const h = (this.baseHue + hOffset * direction + 360) % 360;
                    return { h: h, s: 85, l: 68 }; 
                }

            case 'pastel':
                if (isAccent) {
                    return { h: this.accentHue, s: 60 + Math.random() * 15, l: 70 + Math.random() * 10 };
                } else {
                    const h = (this.baseHue + Math.floor(Math.random() * 46) - 23 + 360) % 360;
                    return { h, s: 45 + Math.random() * 20, l: 75 + Math.random() * 10 };
                }

            case 'neon':
                if (isAccent) {
                    return { h: this.accentHue, s: 100, l: 60 };
                } else {
                    const h = (this.baseHue + Math.floor(Math.random() * 30) - 15 + 360) % 360;
                    return { h, s: 100, l: 55 };
                }

            case 'classic':
                const circleSat = 6 + Math.floor(Math.random() * 9); 

                if (isAccent) {
                    const lAccent = this.bgLight >= 50 ? 30 : 70;
                    return { h: this.accentHue, s: circleSat, l: lAccent };
                } else {
                    const direction = Math.random() > 0.5 ? 1 : -1;
                    const hOffset = 50 + Math.floor(Math.random() * 51); 
                    const jitter = Math.floor(Math.random() * 31) - 15;   
                    const h = (this.baseHue + (hOffset * direction) + jitter + 360) % 360;
                    
                    const lOffset = this.bgLight >= 50 ? -15 : 12;
                    return { h: h, s: circleSat, l: this.bgLight + lOffset };
                }
        }
    }
}

// --- 円（Circle）クラス ---
class CircleRipple {
    constructor(x, y, color, tone) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.tone = tone;
        this.radius = 0;
        this.maxRadius = 7 + Math.random() * 13; 
        this.speed = 0.1;                      
        this.acceleration = 0.03 + Math.random() * 0.04; 
        this.opacity = 1;
    }

    update() {
        this.speed += this.acceleration;
        this.radius += this.speed;

        let progress = this.radius / this.maxRadius;
        if (progress > 1) progress = 1;

        if (this.tone === 'vivid') {
            if (progress < 0.8) {
                this.opacity = 1.0;
            } else {
                this.opacity = (1.0 - progress) / 0.2;
            }
        } else if (this.tone === 'classic') {
            // 【アップデート】より不透明度を高く維持（初期〜中盤はしっかり残し、終盤の30%でフェードアウト）
            if (progress < 0.7) {
                this.opacity = 0.88 - (progress * 0.1); // 初期も100%ではなく、背景に馴染む僅かな透明感（85〜88%）をキープ
            } else {
                this.opacity = ((1.0 - progress) / 0.3) * 0.78;
            }
        } else {
            this.opacity = Math.pow(1 - progress, 1.5); 
        }
    }

    draw() {
        if (this.opacity <= 0.01) return;

        ctx.save();
        
        if (this.tone === 'neon') {
            ctx.shadowBlur = 12;
            ctx.shadowColor = `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, ${this.opacity})`;
        }

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, ${this.opacity})`;
        ctx.fill();
        
        ctx.restore();
    }
}

// 初期化
let palette = new Palette();
document.body.style.backgroundColor = palette.bgColor;
let circles = [];

let time = 0;
let spawnTimer = 0;

function animate() {
    ctx.fillStyle = palette.bgColor;
    ctx.fillRect(0, 0, width, height);

    time += 0.003; 

    const wave = (Math.sin(time) + Math.sin(time * 1.7) * 0.3) / 1.3;
    const intensity = (wave + 1) / 2; 

    const currentInterval = 6.0 - (intensity * 5.25);
    const maxCount = Math.floor(intensity * 8); 

    spawnTimer++;
    if (spawnTimer >= currentInterval) {
        const currentCount = maxCount === 0 ? (Math.random() > 0.5 ? 1 : 0) : Math.floor(Math.random() * (maxCount + 1));
        
        for(let i = 0; i < currentCount; i++) {
            const x = Math.random() * width;
            const y = Math.random() * height;
            circles.push(new CircleRipple(x, y, palette.getRippleColor(), palette.tone));
        }
        spawnTimer = 0;
    }

    for (let i = circles.length - 1; i >= 0; i--) {
        circles[i].update();
        circles[i].draw();

        if (circles[i].opacity <= 0.01 || circles[i].radius >= circles[i].maxRadius) {
            circles.splice(i, 1);
        }
    }

    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    ctx.fillStyle = palette.bgColor;
    ctx.fillRect(0, 0, width, height);
});

window.addEventListener('click', (e) => {
    for(let i = 0; i < 4; i++) { 
        const offsetX = (Math.random() - 0.5) * 25;
        const offsetY = (Math.random() - 0.5) * 25;
        circles.push(new CircleRipple(e.clientX + offsetX, e.clientY + offsetY, palette.getRippleColor(), palette.tone));
    }
});

animate();
</script>

</body>
</html>
