<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meaningless</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <h1>Meaningless</h1>
  </header>

  <main class="gallery-container">
    
    <a href="Circles.html" class="gallery-item item-color4">
      <div class="item-content">
        <h2>Circles</h2>
        <p class="description">色の波紋。リロードすると色のパターンが変わる。</p>
      </div>
    </a>

    <a href="Flow.html" class="gallery-item item-color3">
      <div class="item-content">
        <h2>Flow</h2>
        <p class="description">色の流れ。</p>
      </div>
    </a>

    <a href="Ruins.html" class="gallery-item item-color2">
      <div class="item-content">
        <h2>Ruins</h2>
        <p class="description">崩れ去る言葉。</p>
      </div>
    </a>

    <a href="Life.html" class="gallery-item item-color1">
      <div class="item-content">
        <h2>Life</h2>
        <p class="description">生まれて死ぬ。クリック（タップ）するといっぱい生まれる。</p>
      </div>
    </a>

  </main>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="https://x.com/あなたのユーザー名" target="_blank" rel="noopener noreferrer">X (TWITTER)</a>
      <a href="https://instagram.com/あなたのユーザー名" target="_blank" rel="noopener noreferrer">INSTAGRAM</a>
      <a href="https://github.com/あなたのユーザー名" target="_blank" rel="noopener noreferrer">GITHUB</a>
    </div>
  </footer>

  <script>
    const galleryItems = document.querySelectorAll('.gallery-item');

    galleryItems.forEach(item => {
      // スマホ用のタッチ開始イベントで確実に先手を打つ
      item.addEventListener('touchstart', function(e) {
        // 画面幅がスマホサイズ（768px以下）のときだけ発動
        if (window.innerWidth <= 768) {
          
          // もし、まだ開いていない（activeクラスがない）場合
          if (!this.classList.contains('active')) {
            // 🛑 リンクの標準動作（画面遷移）を完全にブロックする
            e.preventDefault(); 
            
            // 他の開いているバーをすべて閉じる
            galleryItems.forEach(i => i.classList.remove('active'));
            
            // このバーを開く（activeにする）
            this.classList.add('active');
          }
          // すでに active がついている場合は e.preventDefault() が通らないため、
          // 次の「クリック（タップ）」判定で通常通りリンク先にジャンプします。
        }
      }, { passive: false }); // デフォルト動作のキャンセル（preventDefault）をブラウザに許可させる設定
    });

    // 背景（作品バー以外）をタップしたら説明を閉じる
    document.addEventListener('touchstart', function(e) {
      if (!e.target.closest('.gallery-item')) {
        galleryItems.forEach(item => item.classList.remove('active'));
      }
    });
  </script>

</body>
</html>
